<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <style>
        body{
            background-color: yellow;
            font-family: 'Times New Roman', Times, serif;
        }
        .container{
            background-color: white;
            margin: auto;
            padding: 10px;
            width: 50%;
        }
        input[type="email"]{
            padding-bottom: 10px;
            margin-bottom: 10px;
            width: 100%;
        }
        input[type="password"]{
            padding-bottom: 10px;
            margin-bottom: 10px;
            width: 100%;
        }
        input[type="email"]:focus{
            background-color: aqua;
            color: black;
        }
        input[type="password"]:focus{
            background-color: aqua;
            color: black;

        }
        input[type="reset"]:focus{
            background-color: aqua;
            width: 40%;
            color: black;
            margin-right: 10px;
        }
        input[type="sumbit"]:focus{
            background-color: aqua;
            width: 40%;
            color: black;
            margin-right: 10px;
        }
        .signin{
            background-color: darkolivegreen;
            margin: auto;
            padding: 10px;
            width: 50%;
        }
    </style>
    <!--<a href="Registration.css"></a>-->
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        <p>Please fill in this form to create an account.</p>
        <hr>
        <form action="/register" name="register" method="post">
            <label for="email">
                <b>Email</b>
            </label>
            <input type="email" placeholder="Enter Valid Email" id="email">
            <label for="password"></label>
                <b>Password</b>
            </label>
            <input type="password" placeholder="Enter Password" id="password">
            <label for="confirm password"></label>
                <b>Confirm Password</b>
            </label>
            <input type="password" placeholder="Re-enter password" id="password">
            <hr>
            <p>By Creating an account you agree to our <a>terms and privacy</a></p>
            <input type="submit" value="REGISTER">
            <input type="reset" value="RESET">
        </form>
    </div>
    <div class="signin">
        Already have an account? <a href="#">Sign in</a>
    </div>
    
</body>
</html>
